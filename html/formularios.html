<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulários</title>
</head>
<body>

    <center>
        <h1>Formulário de Inscrição</h1>

        <p>
            Nesta página, usamos formulário para coletar informações de inscrição em um curso.
        </p>

        <hr width="80%">

        <form action="#" method="POST" name="inscricao">

            <table border="1" cellpadding="12" cellspacing="0" width="750">
                <tr bgcolor="#dddddd">
                    <th colspan="2">Inscrição para Curso HTML5</th>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <img src="../img/html.png" alt="Imagem do curso" width="150">
                        <br><br>
                        <strong>Preencha os dados abaixo para realizar sua inscrição.</strong>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="nome">Nome completo:</label>
                    </td>
                    <td>
                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="email">E-mail:</label>
                    </td>
                    <td>
                        <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="telefone">Telefone:</label>
                    </td>
                    <td>
                        <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="nascimento">Data de nascimento:</label>
                    </td>
                    <td>
                        <input type="date" id="nascimento" name="nascimento">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="curso">Curso desejado:</label>
                    </td>
                    <td>
                        <select id="curso" name="curso">
                            <option value="">Selecione</option>
                            <option value="html5">HTML5</option>
                            <option value="css3">CSS3</option>
                            <option value="javascript">JavaScript</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Período:</td>
                    <td>
                        <input type="radio" id="manha" name="periodo" value="manha">
                        <label for="manha">Manhã</label>

                        <br>

                        <input type="radio" id="tarde" name="periodo" value="tarde">
                        <label for="tarde">Tarde</label>

                        <br>

                        <input type="radio" id="noite" name="periodo" value="noite">
                        <label for="noite">Noite</label>
                    </td>
                </tr>

                <tr>
                    <td>Interesses:</td>
                    <td>
                        <input type="checkbox" id="html" name="interesses" value="html">
                        <label for="html">HTML</label>

                        <br>

                        <input type="checkbox" id="css" name="interesses" value="css">
                        <label for="css">CSS</label>

                        <br>

                        <input type="checkbox" id="js" name="interesses" value="javascript">
                        <label for="js">JavaScript</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="observacao">Observações:</label>
                    </td>
                    <td>
                        <textarea id="observacao" name="observacao" rows="5" cols="45" placeholder="Digite alguma observação"></textarea>
                    </td>
                </tr>

                <tr bgcolor="#eeeeee">
                    <td colspan="2" align="center">
                        <input type="submit" value="Enviar inscrição">
                        <input type="reset" value="Limpar formulário">
                    </td>
                </tr>
            </table>

        </form>

        <br>

        <hr width="80%">

        <p>
            <a href="../index.html">Voltar para a página inicial</a>
        </p>
    </center>

</body>
</html>
